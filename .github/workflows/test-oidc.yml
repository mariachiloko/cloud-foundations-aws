name: Test OIDC AWS Access

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test-aws-access:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Show OIDC context
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          test -n "$AWS_ROLE_ARN" || {
            echo "AWS_ROLE_ARN GitHub variable is not set."
            exit 1
          }
          case "$AWS_ROLE_ARN" in
            arn:aws:iam::*:role/*) ;;
            *)
              echo "AWS_ROLE_ARN does not look like a valid IAM role ARN: $AWS_ROLE_ARN"
              exit 1
              ;;
          esac
          echo "Role ARN: $AWS_ROLE_ARN"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Expected sub claim: repo:${{ github.repository }}:ref:${{ github.ref }}"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-oidc-test
          audience: sts.amazonaws.com
          aws-region: us-east-1

      - name: Test AWS Access
        run: aws sts get-caller-identity
